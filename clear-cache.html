<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Limpando cache...</title>
<style>
  body { background:#0a1929; color:#e8f4f8; font-family:sans-serif;
         display:flex; align-items:center; justify-content:center; height:100vh; margin:0; text-align:center; }
  .msg { font-size:20px; }
</style>
</head>
<body>
<div class="msg" id="msg">🔄 Limpando cache e Service Worker...</div>
<script>
(async () => {
  try {
    // Desregistrar todos os Service Workers
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const r of regs) await r.unregister();
    }
    // Apagar todos os caches
    const keys = await caches.keys();
    await Promise.all(keys.map(k => caches.delete(k)));

    document.getElementById('msg').textContent = '✅ Cache limpo! Redirecionando...';
    setTimeout(() => { window.location.href = '/'; }, 1000);
  } catch (e) {
    document.getElementById('msg').textContent = '❌ Erro: ' + e.message;
  }
})();
</script>
</body>
</html>
