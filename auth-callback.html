<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<script>
  /*
   * auth-callback.html
   * Recebe o ?code= do Google OAuth (PKCE) e troca pelos tokens de sessão.
   *
   * IMPORTANTE: detectSessionInUrl: false — sem isso o SDK tenta trocar o
   * código automaticamente na inicialização E depois o exchangeCodeForSession
   * manual também tentaria, causando falha (código PKCE é de uso único).
   */
  var client = window.supabase.createClient(
    'https://nkuiwdolkluetsadauwb.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5rdWl3ZG9sa2x1ZXRzYWRhdXdiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjQ0OTgsImV4cCI6MjA4OTgwMDQ5OH0.xIkowv91_aL-v03HIPtg9Ni6M_rROs7VcZS2qa3PbV4',
    {
      auth: {
        flowType: 'pkce',
        persistSession: true,
        detectSessionInUrl: false,  // ← CRÍTICO: desativa troca automática do SDK
        storageKey: 'sb-nkuiwdolkluetsadauwb-auth-token'  // mesmo key do app principal
      }
    }
  );

  // Troca manual: única chamada → sem conflito
  client.auth.exchangeCodeForSession(window.location.href)
    .then(function (res) {
      if (res.error) {
        console.error('auth-callback error:', res.error.message);
        window.location.replace('/');
        return;
      }
      if (res.data && res.data.session) {
        window.location.replace('/app');
      } else {
        window.location.replace('/');
      }
    })
    .catch(function (err) {
      console.error('auth-callback exception:', err);
      window.location.replace('/');
    });
</script>
</body>
</html>
